<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Define a single petal path for the 5-part swirl -->
    <path id="swirl-petal" d="M 50,10 C 68,10 82,23 85,38 C 88,53 82,65 67,65 C 55,65 47,53 47,42 C 47,28 55,20 50,10 Z" />
    
    <!-- Smooth subtle gradients for a rich 3D look like the user image -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2c8bf7" />
      <stop offset="100%" stop-color="#0056c6" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f24d3e" />
      <stop offset="100%" stop-color="#c51605" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffce31" />
      <stop offset="100%" stop-color="#e29e00" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2bb256" />
      <stop offset="100%" stop-color="#156e2f" />
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00beab" />
      <stop offset="100%" stop-color="#007e71" />
    </linearGradient>
  </defs>

  <g transform="translate(0, 0)">
    <!-- 5 Petals rotated at 72 degree increments around Center (50, 50) -->
    <!-- Top Blue Petal -->
    <use href="#swirl-petal" transform="rotate(0 50 50)" fill="url(#blueGrad)" />
    <!-- Right Red Petal -->
    <use href="#swirl-petal" transform="rotate(72 50 50)" fill="url(#redGrad)" />
    <!-- Bottom Yellow Petal -->
    <use href="#swirl-petal" transform="rotate(144 50 50)" fill="url(#yellowGrad)" />
    <!-- Left Green Petal -->
    <use href="#swirl-petal" transform="rotate(216 50 50)" fill="url(#greenGrad)" />
    <!-- Top-Left Cyan Petal -->
    <use href="#swirl-petal" transform="rotate(288 50 50)" fill="url(#cyanGrad)" />
  </g>
</svg>
